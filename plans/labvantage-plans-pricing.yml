specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: LabVantage
providerId: labvantage
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - LIMS
  - Laboratory
  - Pharma
  - Quality
  - Enterprise Software
description: LabVantage Solutions sells LIMS, ELN, LES, and SDMS modules to pharma, biotech, and clinical
  laboratories under enterprise-software contracts. Pricing is not published; deployment can be on-premises
  or hosted, perpetual or subscription, and is sized by users / sites / instruments / modules. The API
  surface ships with the platform — there is no separately metered API price.
sources:
  - https://www.labvantage.com/
  - https://www.labvantage.com/services/customer-care/
notes: No public pricing page; LabVantage deployments are scoped and quoted per-customer. The REST/SOAP
  APIs are bundled with the platform license and not sold as a standalone tier.
plans:
  - id: labvantage-enterprise-license
    name: LabVantage Enterprise License
    type: enterprise
    description: Per-customer enterprise license sized by user count, sites, instruments, and module
      scope (LIMS, ELN, LES, SDMS, Stability, Bioanalytics). Available as on-premises perpetual + maintenance
      or hosted subscription.
    entries:
      - label: Platform license
        name: platform_license
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: LabVantage LIMS API
      - name: LabVantage ELN (Electronic Lab Notebook) API
      - name: LabVantage LES API
      - name: LabVantage SDMS API
      - name: GxP / 21 CFR Part 11 compliance features
      - name: Validation documentation
