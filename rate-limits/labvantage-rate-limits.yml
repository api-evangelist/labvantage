specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: LabVantage
providerId: labvantage
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - LIMS
  - Laboratory
description: LabVantage's REST and SOAP APIs are deployed inside each customer's environment (on-premises
  or hosted). Vendor does not publish per-second / per-minute API rate limits; effective limits are governed
  by the customer's deployment sizing (application server, database, integration server) and any reverse-proxy
  / WAF policies in front of LabVantage.
sources:
  - https://www.labvantage.com/
notes: Single-tenant deployments mean rate limits are deployment-specific rather than vendor-imposed.
  Confirm any documented platform-level governors with LabVantage Customer Care.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: REST / SOAP API
    scope: deployment
    metric: varies
    limit: 'governed by customer deployment sizing; no published vendor numeric limit'
policies:
  - name: Application server sizing
    description: Throughput is bound by the customer's LabVantage application server tier and database
      capacity; scale by adding application-server nodes rather than relying on a vendor-side rate plan.
  - name: GxP audit overhead
    description: All write operations generate 21 CFR Part 11 audit records; sustained high-write workloads
      should be sized accordingly.
  - name: Backoff Strategy
    description: Honor Retry-After when present; otherwise apply exponential backoff with jitter on 429/503
      responses.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
