specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: LabVantage
providerId: labvantage
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - LIMS
  - Laboratory
  - Pharma
description: 'FOCUS-aligned FinOps for LabVantage: enterprise-licensed LIMS/ELN/LES/SDMS platform with
  no per-API metering. Cost is dominated by the negotiated platform license plus the underlying compute
  for the customer''s own deployment. FinOps signal therefore covers license utilization (named users,
  sites, modules) and infrastructure cost separately.'
sources:
  - https://www.labvantage.com/
notes: No public unit pricing for the API surface. License terms (perpetual + maintenance vs subscription)
  are quoted per customer.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: LabVantage Solutions, Inc.
serviceCategory: Laboratory Informatics / LIMS
billingModel:
  pricingCategory: Enterprise License (Perpetual or Subscription)
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: LabVantage Platform
  ServiceCategory: Laboratory Informatics / LIMS
  ProviderName: LabVantage
  PublisherName: LabVantage Solutions, Inc.
  InvoiceIssuerName: LabVantage Solutions, Inc.
  BillingCurrency: USD
meters:
  - name: named_users
    unit: seat
    aggregation: max
    dimensions:
      - module
      - site
  - name: concurrent_users
    unit: session
    aggregation: max
    dimensions:
      - module
  - name: instrument_integrations
    unit: instrument
    aggregation: max
    dimensions:
      - site
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - protocol
      - module
      - site
  - name: storage_consumed
    unit: GB
    aggregation: max
    dimensions:
      - module
principles:
  - name: Visibility
    description: Capture seat utilization and integration counts per module against contracted entitlements;
      monitor underlying infrastructure cost (compute, DB, storage) for the deployment.
  - name: Allocation
    description: Allocate license cost per site / lab / project; pair the license bill with the infra
      bill so total cost-of-ownership is visible to the lab informatics team.
  - name: Optimization
    description: Reclaim inactive named-user seats; consolidate test instances; right-size the application
      server tier; archive aged study/sample data to lower-tier storage.
  - name: Accountability
    description: Lab informatics or QA owns the LabVantage agreement and module roster; reviews user
      entitlements quarterly ahead of renewal.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
